name: Infrastructure Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # .NET Build
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore dependencies
        run: dotnet restore DotNetApp/DotNetApp.csproj

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet-sonarscanner begin /k:"Shaunak-ondare_Ansible-devsecops-tf" /o:"shaunak-ondare" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.cobertura.reportsPaths="TestResults/**/*.xml"
          
          dotnet build DotNetApp.sln
          
          dotnet test DotNetApp.Tests/DotNetApp.Tests.csproj \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --no-build \
            --verbosity normal
            
          dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Upload Quality & Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QualityGate-Report
          path: TestResults/

      - name: Generate Fancy HTML Report
        if: always()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator -reports:TestResults/**/*.xml -targetdir:TestResults/HtmlReport -reporttypes:HtmlInline_AzurePipelines

      - name: Upload Fancy Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Fancy-Test-Report
          path: TestResults/HtmlReport

      - name: Publish
        run: dotnet publish DotNetApp/DotNetApp.csproj -c Release -o DotNetApp/dist

      - name: Upload Published App
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: DotNetApp/dist/

      # Security & Quality Scans
      - name: Run Snyk scan
        uses: snyk/actions/dotnet@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --all-projects


  terraform:
    needs: build-and-scan
    runs-on: ubuntu-latest
    outputs:
      linux_ip: ${{ steps.output.outputs.linux_ip }}
      windows_ip: ${{ steps.output.outputs.windows_ip }}
      controller_ip: ${{ steps.output.outputs.controller_ip }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_windows_password: ${{ secrets.WINDOWS_PASSWORD }}
          TF_VAR_controller_key_name: Mumbai1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_windows_password: ${{ secrets.WINDOWS_PASSWORD }}
          TF_VAR_controller_key_name: Mumbai1

      - name: Get Outputs
        id: output
        working-directory: terraform
        run: |
          echo "linux_ip=$(terraform output -raw linux_public_ip)" >> $GITHUB_OUTPUT
          echo "windows_ip=$(terraform output -raw windows_public_ip)" >> $GITHUB_OUTPUT
          echo "controller_ip=$(terraform output -raw controller_public_ip)" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  ansible:
    needs: [build-and-scan, terraform]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download App Artifact
        uses: actions/download-artifact@v4
        with:
          name: published-app
          path: DotNetApp/dist/

      - name: Prepare Ansible Controller
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > id_rsa
          chmod 600 id_rsa
          
          # Setup SSH config for easy access
          mkdir -p ~/.ssh
          echo "Host controller
            HostName ${{ needs.terraform.outputs.controller_ip }}
            User ubuntu
            IdentityFile $(pwd)/id_rsa
            StrictHostKeyChecking no
          " > ~/.ssh/config

          # 1. Bootstrap Ansible on Controller
          ssh controller "sudo apt-get update && sudo apt-get install -y ansible python3-winrm"
          ssh controller "ansible-galaxy collection install ansible.windows community.windows"
          
          # 2. Sync Project Files
          # Note: We include the id_rsa so the controller can talk to the linux worker
          scp id_rsa controller:/home/ubuntu/id_rsa
          ssh controller "chmod 600 /home/ubuntu/id_rsa"
          
          # 3. Prepare Inventory with proper IPs and Secrets
          sed -i "s/LINUX_IP_HERE/${{ needs.terraform.outputs.linux_ip }}/g" ansible/inventory.ini
          sed -i "s/WINDOWS_IP_HERE/${{ needs.terraform.outputs.windows_ip }}/g" ansible/inventory.ini
          sed -i "s|WINDOWS_PASSWORD_HERE|${{ secrets.WINDOWS_PASSWORD }}|g" ansible/inventory.ini
          
          # 4. Upload Ansible Folder
          scp -r ansible/ controller:/home/ubuntu/
          
          # 5. Upload App Artifacts (Inject into Role Files)
          ssh controller "mkdir -p /home/ubuntu/ansible/roles/windows_stack/files/app_dist"
          scp -r DotNetApp/dist/. controller:/home/ubuntu/ansible/roles/windows_stack/files/app_dist/

      - name: Execute Remote Playbook
        run: |
          ssh controller "export WINDOWS_PASSWORD='${{ secrets.WINDOWS_PASSWORD }}' && cd /home/ubuntu/ansible && ansible-playbook -i inventory.ini playbook.yml"
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
