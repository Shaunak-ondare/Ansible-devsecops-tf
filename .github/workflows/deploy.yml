name: Infrastructure Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # .NET Build
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore dependencies
        run: dotnet restore DotNetApp/DotNetApp.csproj

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet-sonarscanner begin /k:"Shaunak-ondare_Ansible-devsecops-tf" /o:"shaunak-ondare" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.cobertura.reportsPaths="TestResults/**/*.xml"
          
          dotnet build DotNetApp.sln
          
          dotnet test DotNetApp.Tests/DotNetApp.Tests.csproj \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --no-build \
            --verbosity normal
            
          dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Upload Quality & Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QualityGate-Report
          path: TestResults/

      - name: Generate Fancy HTML Report
        if: always()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator -reports:TestResults/**/*.xml -targetdir:TestResults/HtmlReport -reporttypes:HtmlInline_AzurePipelines

      - name: Upload Fancy Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Fancy-Test-Report
          path: TestResults/HtmlReport

      - name: Publish
        run: dotnet publish DotNetApp/DotNetApp.csproj -c Release -o DotNetApp/dist

      - name: Upload Published App
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: DotNetApp/dist/

      # Security & Quality Scans
      - name: Run Snyk scan
        uses: snyk/actions/dotnet@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --all-projects


  terraform:
    needs: build-and-scan
    runs-on: ubuntu-latest
    outputs:
      linux_ip: ${{ steps.output.outputs.linux_ip }}
      windows_ip: ${{ steps.output.outputs.windows_ip }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Get Outputs
        id: output
        working-directory: terraform
        run: |
          echo "linux_ip=$(terraform output -raw linux_public_ip)" >> $GITHUB_OUTPUT
          echo "windows_ip=$(terraform output -raw windows_public_ip)" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  ansible:
    needs: [build-and-scan, terraform]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Isolated Ansible Environment
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install ansible pywinrm requests
          ansible-galaxy collection install ansible.windows community.windows

      - name: Download App Artifact
        uses: actions/download-artifact@v4
        with:
          name: published-app
          path: DotNetApp/dist/ # Need to ensure this is shared if multi-job

      # Note: For real world, we'd use artifacts to pass files between jobs.
      # Simplifying: Assume this is all in one large job or use artifacts.
      
      - name: Run Ansible Playbook
        working-directory: ansible
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > id_rsa
          chmod 600 id_rsa
          sed -i "s/LINUX_IP_HERE/${{ needs.terraform.outputs.linux_ip }}/g" inventory.ini
          sed -i "s/WINDOWS_IP_HERE/${{ needs.terraform.outputs.windows_ip }}/g" inventory.ini
          sed -i "s/WINDOWS_PASSWORD_HERE/${{ secrets.WINDOWS_PASSWORD }}/g" inventory.ini
          
          ../venv/bin/ansible-playbook -i inventory.ini playbook.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
